front:
  text: 靈寶淨明大法萬道玉章祕訣身七夫神玄未肇化空獨輪渺靄三氣之先混淪二儀之始無氣挺運無色無形暗曜凝虛乍亡乍存中有象帝元始至尊啓劫開圖明廓秀梵文華昭粹流雲結芳於太初回霞鬱煙玄紀呇景於碧落字方一丈八角垂芒召洞陽之融精為郁瑛之流火飛丹炅浩冶錬變章名曰赤書呈祥孕字皇人按筆昔書其文散布諸天安鎮萬國三境由兹以朗耀五緯因此以生成普植神靈萬範開麗至始青之大㑹傳上品於玉晨昭明黍珠廣示道體神變十回恢洪妙用而有敢宣傳三千道境無量度人演說五億諸天品秩莫測三十六部祕在玄宫萬八千篇流芳塵地上該帝一混合之道則大定歷劫以無傾中明五法育初之法則造化萬彚以長存下說人身三宫之妙則體道含真而功用在已其緒餘也以濟生度死開宥九幽超涉玄津僕昔在太陽玄宫掌紫閣圖籍嘗侍無上三真說璇綱清氣採取玄範之圖注練百開生成玉字之經一身三聖萬道同體之書神動天隨念動化移之法洞觀三界徹視萬靈之妙先被宸命承左仙公之代以功德未備尚猶困辱塵世粗訖萬分倣佛之一以傳吾門同志受者毋忽焉太陽玄宫昌明閣掌圖籍小兆謹序謹按天真皇人八明訓解一者明元始祖氣何先化成玉字二者明元始祖氣無形之先作何比擬降質成氣化生萬寶今世作何體狀採錬此氣餌之登真玄訓曰自三氣之先溟涬之後其中真精歘火挺生元氣元氣之內有神人曰元始天尊其氣混凝與神同生流化結芳非相非色或卷或舒不可致詰不可名象至延康開劫一氣分形而為二氣名曰虛無二氣交絡凝相太空乍存乍亡彌覆無際二氣混包掩靄光華中有文章八角垂芒莫辨文理至一劫之後龍漢元年開劫顯明分𨽻二氣以成玄黃之色是時啓判鴻濛分析混沌清氣澄髙積陽成天濁氣降凝積滯成地二氣分形玉字兆相字方一丈八角成文名曰雲篆光明之章二氣升降或離或合中化冲和之氣又曰始青之氣又曰大梵之氣化真陽之精而洞陽之火流冶十方天尊運洞陽神火冶錬天文於太空之際三氣混合飛霞結質光瑩萬天照徹無極混㑹自象而成赤書因而劫號赤明之劫文號赤書玉字因字化生三景照煥三光矣玉字以此而化生也所謂今世作何體狀復採錬此氣為寶餌之登真者玄訓曰謂神降為靈氣聚為寶蚌吸月華而孕珠犀觀星輝而秀象形彩照珉以生丹皓虹映石産璧蓋靈寶之氣禽飲生鳯獸嘯産麟人服成仙魚飲化龍又曰聖母靈父元氣氣來入身謂之道生生道合一謂之得道經云引氣三十二遍又曰流精玉光又曰氣入玄玄蓋言此也謹按元始赤書五篇真文生於太空之中天地未光開圖赤明濳結元根三景成立五氣行焉五色分彩洞煥五方置以五常導以隂陽輪轉九天之紐運明五星之光植五嶽而安鎮澳人五府以養神是以至真之人嘗依陽光之始明上導元始之氣下引玉泉之流芳致元精於太極招五氣於靈宫所為靈寶妙訣萬聖之根宗也謹按圖如左太皇黃曽天梵氣黃氣中斗綱清氣太明玉完天緑氣壁宿綱清氣清明何童天青氣室宿綱清氣玄胎平育天赤氣危宿綱清氣元明文舉天蒼氣虛宿綱清氣上明七曜天黑氣女宿綱清氣虛無越衡天碧氣牛宿綱清氣太極濛翳天紫氣斗宿綱清氣赤明和陽天梵氣白氣中斗綱清氣玄明恭華天黃氣箕宿綱清氣曜明宗飄天緑氣尾宿綱清氣𥫦落皇笳天青氣心宿綱清氣虛明堂曜天赤氣房宿綱清氣觀明端靖天蒼氣氐宿綱清氣玄明恭慶天黑氣亢宿綱清氣太煥極瑶天碧氣角宿綱清氣元載孔升天紫氣梵氣中斗綱清氣太安皇崖天白氣軫宿綱清氣顯定極風天黃氣翼宿綱清氣始皇孝芒天緑氣張宿綱清氣太皇翁重天青氣星宿綱清氣無思江由天赤氣柳宿綱清氣上楪阮樂天蒼氣鬼宿綱清氣無極曇誓天黑氣井宿綱清氣皓庭霄度天碧氣梵氣中斗綱清氣淵通元洞天紫氣參宿綱清氣太文翰寵天白氣觜宿綱清氣太素秀樂天黃氣畢宿綱清氣太虛無上天緑氣昴宿綱清氣太釋玉隆天青氣胃宿綱清氣龍變梵度天赤氣婁宿綱清氣太極平育天蒼氣奎宿綱清氣太皇黃曽天帝君諱觀覺
