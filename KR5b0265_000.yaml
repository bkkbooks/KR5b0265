body:
  text: 主長生録居紫極宫治在北方亥之西玉完天帝君諱攬覺主度魂更生居紫房宫治在北方亥之東何童天帝君諱大覺主敷教度人居九晨宫治在北方壬之西平育天帝君諱育元主召元舉仙居元景宫治在北方壬之東文舉天帝君諱梵雲主通行元氣居廣寒宫治在北方癸之西七曜天帝君諱玉真主開玄度難居太隂宫治在北方癸之東越衡天帝君諱無上主明無上道居太玄宫治在北方丑之西濛翳天帝君諱吁貟主錬度亡魂居玄都宫治在北方丑之東和陽天帝君諱煥明主錬成真仙居長明宫治在東方寅之北恭華天帝君諱世元主應化一切居東華宫治在東方寅之南宗飄天帝君諱洛覺劫終納學仙之人居昊元宫治在東方甲之北皇笳天帝君諱韶主魔試學仙之人居青玄官治在東方甲之南堂曜天帝君諱雲上主開度天地之人居重華宫治在東方乙之北端靖天帝君諱靜生主度學者之身居光華宫治在東方乙之南恭慶天帝君諱鏡主度得道之人居開合宫治在東方辰之北極瑶天帝君諱廓奕主教學仙之人居帝康宫治在東方辰之南孔升天帝君諱猷主録度死魂更生居延命宫治在南方已之東皇崖天帝君諱宛主開度善人居開明宫治在南方已之西極風天帝君諱流主度有善功之魂居太赫宫治在南方丙之東孝芒天帝君諱易邈主拔易開幽居太丹宫治在南方丙之西翁重天帝君諱阿繿主召魔集真居華蓋宫治在南方丁之東江由天帝君諱阿丘主開度善魂居明堂宫治在南方丁之西阮樂天帝君諱無量主品類天人等級居靈連宫治在南方未之東曇誓天帝君諱曇主度一切仙人居中元宫治在西方未之西霄度天帝君諱育主救度學人居瓊瑶宫治在西方申之南元洞天帝君諱上主度學仙人居真元宫治在西方申之北妙成天帝君諱陀主統攝魔王神居靈幽宫治在西方庚之南禁上天帝君諱隗主領南魔王居化靈宫治在西方庚之北常融天帝君諱極主校學者之功居萬福宫治在西方辛之南騰勝天帝君諱浮𥠖主召集仙聖居白蓋宫治在西方辛之北梵度天帝君諱惡奕主進仙成聖居雲保宫治在西方戌之南賈奕天帝君諱精上主度學者之身居天寶宫治在西方戌之北諸天開圖卦爻甲子亶婁阿薈豫卦丁丑太皇黃曽天無惒觀音隨卦戊寅須延明首蠱卦已卯太明玉完天法攬菩曇臨卦庚辰稼那阿奕觀卦辛巳清明何童天忽訶流吟噬嗑壬午華都曲麗賁卦癸未玄胎平育天鮮菩育臻剝卦甲申答洛大梵復卦乙酉元明文舉天散煙慶雲無妄丙戌飛灑玉都大畜丁亥上明七曜天明魔上門頥卦戊子無行上首大過已丑虛無越衡天回跖流玄坎卦阿陀龍羅離卦太極濛翳天四象吁員咸卦庚寅南閻洞浮𢘆卦辛卯赤明和陽天玉眸詵詵遁卦壬辰梵形落空大壯癸巳玄明恭華天九靈推前𣈆卦甲午澤𠗂菩臺明夷乙未曜明宗飄天緑羅大千家人丙申眇莾九醜睽卦丁酉笁落皇笳天韶遙緣邅蹇卦戊戌雲上九都解卦己亥虛明堂曜天飛生自騫損卦庚子那育郁馥益卦辛丑觀明端靖天摩羅法輪夬卦壬寅霐持無鏡姤卦癸卯玄明恭慶天攬姿運容萃卦甲辰馥朗廓奕升卦乙己太煥極瑶天神纓自宫困卦丙午刀利禪猷井卦丁未元載孔升天婆泥咎通革卦戊申宛藪滌色鼎卦己酉太安皇崖天太眇之堂震卦庚戌流羅梵萌艮卦辛亥顯定極風天景蔚蕭嵎漸卦壬子易邈無寂歸妹癸丑始皇孝芒天宛首少都豐卦甲寅阿繿郁笁旅卦乙卯太皇翁重天華莫延冉巽卦丙辰九開自便兊卦丁己無思江由天阿那品首渙卦戊午無量扶蓋節卦己未上揲阮樂天浮羅合神中孚庚申玉誕長桑小過辛酉無極曇誓天柏空度仙既濟壬戌玃無自育未濟癸亥皓庭霄度天九日導乾乾卦坤母東覆坤卦淵通元洞天形攝上玄屯卦甲子陀羅育邈蒙卦乙丑翰寵妙成天眇氣合雲需卦丙寅飛天大醜訟卦丁卯秀樂禁上天總監上天師卦戊辰沙陀劫量比卦己巳無上常融天龍漢瑛鮮小畜庚午碧落浮𥠖履卦辛未玉隆騰勝天空歌保珍泰卦壬申惡奕無品否卦癸酉龍變梵度天洞妙自真同人甲戌元梵恢漠大有乙亥平育賈奕天幽寂度人謙卦丙子諸天氣數卦息數下應人身九億萬氣豫三十九太皇黃曽天下屬聚真府在脾隨四十五八億萬氣蠱四十五太明玉完天下屬氣㑹府在咽喉臨四十二七億萬氣觀四十二清明何童天下屬青靈府在肝噬嗑四十五六億萬氣賁四十五玄胎平育天下屬天督府在胞囊剝三十九五億萬氣復三十九元明文舉天下屬氷陽府在勢中無妄四十八四億萬氣大畜四十八七曜摩夷天下屬隂陽府在欲孔頥四十二三億萬氣大過四十八虛無越衡天下屬合真府在腎中坎四十二二億萬氣離四十八太極濛翳天下屬順陽府在下丹田咸四十五九千萬氣𢘆四十五赤明和陽天下屬太元府在心中遁四十八八千萬氣大壯四十八玄明恭慶天下屬通靈府在膽𣈆四十二七千萬氣明夷四十二曜明宗飄天下屬天寧府在小腸家人四十八六千萬氣睽四十八笁落皇笳天下屬天河府在大陽蹇四十二五千萬氣解四十二虛明堂耀天下屬華蓋府在肺損四十五四千萬氣益四十五觀明端靖天下屬太和府在十二重樓夬五十一三千萬氣姤五十一玄明恭慶天下屬玄林府在髮根萃四十二二千萬氣升四十二太煥極瑶天下屬玄隂府在項困四十五九百萬氣井四十五元載孔升天下屬玄陸府在兩目後革四十八八百萬氣鼎四十八太安皇崖天下屬玄苑府在兩眼目頭震四十二七百萬氣艮四十二顯定極風天下屬玄澧府在舌下漸四十五六百萬氣歸妹四十五始皇孝芒天下屬玄澤府在心中豐四十五五百萬氣旅四十五翁重浮容天下屬巽四十五四百萬氣兌四十五無思江由天下屬玄庭府在臍中渙四十五三百萬氣節四十五上楪阮樂天下屬玄通府在口中中孚四十八二百萬氣小過四十二無極曇誓天下屬玄伺府在右耳既濟四十五九萬九千氣未濟四十五皓庭霄度天下屬玄虛府在左耳乾五十四八萬八千氣坤三十六淵通元洞天下屬玄元府在右目屯四十二七萬七千氣蒙四十二翰寵妙成天下屬玄明府在左目需四十八六萬六千氣訟四十八秀樂禁上天下屬玄微府在右鼻孔師三十九五萬五千氣比三十九無上常融天下屬玄妙府在左鼻孔小畜五十一四萬四千氣履五十一玉隆騰勝天下屬玄陽府在鼻中泰四十五三萬三千氣否四十五龍變梵度天下屬玄極府在玉枕同人五十一二萬二千氣大有五十一平育賈奕天下屬玄都府在頂頭謙三十九修用假令法式玄旨曰步三十二天元綱西龜轉輪無色局步至九萬里到赤明和陽天令踏局令天想氣入口吞丹例謂如內解道德經內甲子屬某府又看靈寶大法隱語所開圖文屬何甲子隱語屬是何天又屬何卦元綱屬何宿步入元綱局中吸木屬天氣入兆身某甲子府依卦爻定息以氣結隱文府內成天文或治事看天府所主清氣用以甲子日甲子時為始用迍卦午時用䝉卦子時服亶婁阿薈四字午時服無惒觀音四字子時服迍卦午時服蒙卦其請天氣法於每日天欲明之時已前晨光初發之始隨諸天面方請梵氣灌注身中所屬宫府訣曰甲子之時稽首望天存其氣色綿綿連連叩齒六六仰望上天存其氣象宛宛延延如絲如霧流注宫田以口回轉如丹如煙以意送歸宫府之邊一呼一吸百脉流遍服之千日神飛上天右於每月三日五日七日九日十五日一月五過受元始之祖氣流布身中功成密有升騰之㑹如上諸法上可動之於心不得以輕示人盜泄則靈散仙無由成修行之法春正二三月朱書文向王叩齒九通而呪曰飛天大梵維羅八方九氣青天總為神王五合八㑹流煥太空上關龍漢神仙之宗下拔長夜九幽之房拔度苦魂朽骸生光身變毛羽五色衣裳蒼龍碧輦飛步空行今日上告青天始陽莫願諧合與氣齊同升入無形永保無窮畢服文仰咽八氣止夏四五六月朱書文向王叩齒八通而呪曰天書敷羅梵行赤明上開八道五合通靈大運啓期洞陽錬精玉文煥朗三景自明下度生死一切受形今日良吉大聖臨庭九夜開牖幽房朗清三惡休息我道自成五帝保度上登蕭京七寶林內長享劫齡畢服文仰咽八氣止秋七八九月朱書文向王叩齒七通而呪曰飛玄八㑹結氣成真六十四字總靈天根開度生死朽骨還人幽魂披散受氣上玄今日時慶萬願開陳衆真交㑹我願成仙景與道合我願我神得乘素雲上升帝晨七寶歡樂交友真人畢服文仰咽八氣止冬十十一十二月朱書文向王叩齒五通而呪曰玉字開冥流煥上門八氣結真梵行景雲神王啓光三象洞分五色徘徊昭我靈魂今日值合仰希帝君大有出書受我真文玉澤交灌五府生雲毛羽變化駕景乘晨出有入旡仙度自然七祖同歸歡樂上元畢服文仰咽八氣止下映人身主諸吉凶上壇頭為上清宫頭頂骨是也動主遇貴善賢人急動君恩赦到痛主父母師友災泥丸宫為太清宫胸骨是也動遇出世神仙文藝頂前急動有雨至腦後動主晴痛主自身災癢主風雲藏宫印堂是也動主印信喜事動慢主逢信善人額上至印堂主印信來癢主小喜至及微風痛主失官壞印天涯宫髮際是也動主隂雨癢主隂雲散春夏癢動急有風雨雷電痛主外服及外親有凶事左右雲涯宫額角是也動主見君子賢善人冷如水滴主有隂雨神門急動恍惚痛名死門開主壽終左右日月宫太隂太陽冗是也左動主東南風右動主西南風腦後左東北風腦後右西北風額前動主見善人痛主父母大災左右雲門宫兩眉是也動主得藝術文書冷癢左主乾坎艮震有隂雲右主巽離坤兌隂雲兩眉頭相牽連動主有相連事眉下眼上動主酒食賔客動痛主大風痛急主因酒食相爭陽聚宫左目是隂聚宫右目是跳動淚出主猛雨至眼上動有人美喜事動急主親眷至眼下臉動主見他哭泣痛如針剌淚出主自已有悲泣事以左陽右隂占之左右勾陳宫兩目上下臉是也左上臉動主陽人說美羡事右上臉動主隂人說美羡事左下臉主陽人破美羡事右下臉主隂人破美羡事如左右下臉痛主兒女子孫有災魔王宫鼻梁是也動主見衆死事又主鬼行隂暗事若鼻撋癢人送物來如鼻酸痛主有人謀計冝愼之左龍遊宫左鼻孔是也動主猛雨痛主水災右虎遊宫右鼻孔是也動主猛風痛主風災日顴宫左顴頰骨是也月顴宫右顴頰骨是也左動主陽人毀謗右動主隂人毀謗兩頰赤癢動有人來面問口舌事如兩頰熱及面熱身心恍惚主毀罵是非喧閙冝愼之左陽宫左耳竅是也七殺宫右耳竅是也左動聞美喜事耳輪動急或痛主州邑有反逆賊至如右動主聞驚惡事痛主不測災冝回靜地避之耳後動如熱氣迫主火發耳前動主水災上瓊林宫人中髭是也下瓊林宫鬚承漿是也動主滋益延納喜美事承漿動主酒食需索事痛主行動艱難辛苦事兩腮動主交友死亡左文右武左男右女五陽門上唇是五隂門下唇是也上動主陽人君子褒美事下動主隂人小人謗說事如唇癢動主美食如稍痛癢主飲食殘缺如唇畔動主飲食唇吻動主憂口舌牙頰動亦主口舌萬物帶舌是也動主食中有毒癢主酒食痛主卒病痛急主口舌如痛癢不止有蠱螞等毒物俯合宫頦頥是也動主近次人毀罵事動癢主借貸財物事痛主大病喪財物事息脢環喉嚨是也動主遇髙人談清髙事咽上喉下痛動主大不祥事兩邊動主見哭泣金鎖宫項窩是也動主天地祥異雷霆大震𣈆動憂枷鎖急動痛主血光項上痛主憂官災兩邊動主飲食中壇白虎宫胸前是也動主𠒋惡人凶惡事相尋癢主上智君子人至痛主凶禍事朱雀門正尻尾下是也動主惡人相謀正心撋癢有人相憶心兩畔動主有人欲心相望心痛徹內主自己死亡左承重宫左肩是也右承重宫右肩是也左動主齊肩朋友至右動主僧尼至左又是道人痛主負重向逺左兵門左胛子骨是也右兵門右胛子骨是也動主見人爭說語言血盆骨動主血光立至背上近胛骨動主兵甲負重事後背心動主下人背己惡逆相害脊骨動主登髙脊膂下動主見貧下相求夾脊兩邊俱動主有人背己鬪謀所求不成左掖道左腋脅是也右掖道右腋脅是也動主見人說相潤事左男右女脅動有人拹己短長右動無害腋下動主間人至兩脅動主見文武官員議事左蟾宫左膞蝦䗫兒是也右蟾宫右膞蝦䗫兒是也左動主青龍喜慶事動癢主有膊至右動主白虎凶憂事動癢主有風左外有勝友至右外主小人來左力士宫左臂肘是也右力士宫右臂肘是也膊外動左主九流人至曲肘裏動主有隂人曲幸隱蔽不相見肘後動有女伎藝來臂內動有技術人來臂上動空門人來臂下動主虛妄人來左聚脉宫左手腕是也右聚脉宫右手腕是也動痛主隂人刑禁事右主打磕損傷事腕癢左主持財入右主持財出右腕痛動主破失財物左衆應宫左手是也右衆應宫右手是也左手掌癢主大得財右手掌癢主財散左大指動主禮樂右大指動主婚禮虎口痛動主毒蟲傷山居被虎狼傷左手背動主爭競痛主歐打左手背癢有微財右手主虛詐左手動癢主髙人指訣事無名小指動有美酒食左手大指痛憂父右拇二指痛憂兄中指痛憂己身四指小指憂子弟左憂母姊妻妹女扶桑宫左乳是也龜臺宫右乳是也兩乳動有人相念左主子孫喜癢主得喜奴婢痛主恩義人身亡下壇福聚宮腹是也欲門臍下是也太淵宮臍心是也車軸關腰是也腹動有福祿人至肚動有暗人嫉妬事臍下動有染著事臍四向中動主弟兄至腰間動有邀譽人至連生處動近上憂六畜臍下撁龜動主婦女交往冝回避之承重宫臀是也臀內動主與髙上人同坐癢痛急動不止見人受刑責臀上動主有爭鬪左臀痛主人爭競毁罵右主隂人謗毀左大力宫左腿是也右大力宫右腿是也大腿股內動主清髙人至近上動主外人至近下動主卑小至又主僧尼至大腿動主見人集㑹事右主隂集㑹左蓋宫左膝是也右蓋官右膝是也左動主拜人右動主受人拜癢主禮拜髙人痛主卑下人拜左轉以宮左腿肚膁韌是也右轉以宮右腿肚膁是也腿肚子動主教藝業人至左乃道士道人至右乃隂人小人至膁外動主縛繫事膁眼䠋骨動主小人誑惑虛妄事曲䐐動主卑小謀害右是隂人膁韌骨痛動主有血傷事左車宫左腳踝是也右車宫右腳踝是也動主逢六畜驚右主猛獸驚腳根筋動主逢惡人腳面動主久别親至右主隂人也左繫鞋宫左腳面是也右繫鞋宫右腳面是也繫鞋文動主劫賊腳面動有驚恐差異事左龍轉宫左腳是也右龍轉宫右腳是也左腳小指繞掌動主見盜賊右主鬪爭掌心痛主死哀腳掌四面動主八方人來以中指為正南也痛主惡人來右腳主防奴婢小人脫賺痛主旱腳根痛動主被人根尋腳腕動主打傷事腳心癢動在主逺行右三壇上應諸天應是三界內外自身骨肉交朋動靜吉凶天氣一降隨氣應之分其三候癢則主喜瞤則主動痛則主凶候其輕重緊慢以五日候之如瞤動沉重疼緊則敦刻應之先重後輕多虛傳謾語其帝命天恩風雨水火及命中一動一瞤主一日三跳已上主十日仍須於受氣之時望諸天於星月下燒香再拜密奏曰具位臣某至心仰告三清玉皇上帝諸天天帝臣受之氣下應臣身敢不精心滌慮思真感神念臣以凡俗昏迷困在塵世罔知世間一切吉凶不能洞曉未來禍福仰告天尊上帝憫臣凡愚𠃔納奏請假借威光正真道氣降流臣身令能聰明智慧上應諸天至誠感神照知臣身世間動靜吉凶預報臣知委臣無任祈恩望聖激切屏營之至臣言再四拜畢再取天氣三口吹於身中凡動靜疼癢依法占之無不預曉不得亂思疑惑愼之愼之受元始萬氣之祖凡修其道常以正月二月三月四月五月六月七月八月九月十月十一月十二月月三日月五日月七日月九日十五日一月五遇清齊誦詠玄文一遍以夜半之後露出中庭仰思北斗華蓋之中有紫雲之氣以斗中罡左回曆度二十八宿竟還金門之上若在人中天隂無光當於室內默念內思如法每令分明思畢當以拜紫雲四通叩齒三通仰祝曰天夜朗清幽虛啓真流雲徘徊金華四騫丹皇敷暉霞飛紫軿是夕開陳青金授化成我上願體應自然結命丹華保命日根三靈合景永停龍山密夜清披請如所言呪畢便口引紫氣二十八咽止行此三年剋有神降兆席也身有紫氣映終一形九天書名必獲上仙也天有紫氣之雲干於日月五星之分在其方圓皆有合道之人得仙之君也如此之候其象自見得見紫雲便依文禮祝不必須其常日也勤如在意刻得雲降升騰有㑹也止可勤之於已不得輕以示人道泄則靈散仙氣無成也洞章玄文飛玄紫氣凝靈根綱維玉靈總萬神其中鬱勃結自然上有稜層十二傳玉樓峩峩耀景雲華精紫闕帶金軒瓊臺玡鑠繞八騫中有青金九靈仙丹皇真母號精延飛青羽欘晨嬰冠左執玉節握靈幡五色命魔對帝尊把持符籍當生門咀日嚼月吸玉泉離羅吐暉錬五魂內充外溢絳府妍金光煥煥形正圓圓以朔朔金色沌唯有開明曉此言日五月十精北元刻見華蓋領仙君紫氣左回與斗連歷度四七入金門正是丹皇降萬仙有明此訣加精勤被形密思每令分妙景感㑹得要文三年當審保長存九年乘空致羽裙鳯衣輕翔升龍山俯仰九靈謁玉宸靈寶淨明大法萬道玉章祕訣終
