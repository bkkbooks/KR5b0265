body:
  text: 主長生録居紫極宫治在北方亥之西玉完天帝君諱攬覺主度魂更生居紫房宫治在北方亥之東何童天帝君諱大覺主敷教度人居九晨宫治在北方壬之西平育天帝君諱育元主召元舉仙居元景宫治在北方壬之東文舉天帝君諱梵雲主通行元炁居廣寒宫治在北方癸之西七曜天帝君諱玉眞主開玄度難居太隂宫治在北方癸之東越衡天帝君諱无上主明无上道居太玄宫治在北方丑之西濛翳天帝君諱吁貟主錬度亡魂居玄都宫治在北方丑之東和陽天帝君諱煥明主錬成眞仙居長明宫治在東方寅之北恭華天帝君諱世元主應化一切居東華宫治在東方寅之南宗飄天帝君諱洛覺劫終納學仙之人居昊元宫治在東方甲之北皇笳天帝君諱韶主魔試學仙之人居青玄官治在東方甲之南堂曜天帝君諱雲上主開度天地之人居重華宫治在東方乙之北端靖天帝君諱靜生主度學者之身居光華宫治在東方乙之南恭慶天帝君諱鏡主度得道之人居開合宫治在東方辰之北極瑶天帝君諱廓奕主教學仙之人居帝康宫治在東方辰之南孔昇天帝君諱猷主録度死魂更生居延命宫治在南方已之東皇崖天帝君諱宛主開度善人居開明宫治在南方已之西極風天帝君諱流主度有善功之魂居太赫宫治在南方丙之東孝芒天帝君諱易邈主拔易開幽居太丹宫治在南方丙之西翁重天帝君諱阿繿主召魔集眞居華蓋宫治在南方丁之東江由天帝君諱阿丘主開度善魂居明堂宫治在南方丁之西阮樂天帝君諱无量主品類天人等級居靈連宫治在南方未之東曇誓天帝君諱曇主度一切仙人居中元宫治在西方未之西霄度天帝君諱育主救度學人居瓊瑶宫治在西方申之南元洞天帝君諱上主度學仙人居眞元宫治在西方申之北妙成天帝君諱陁主統攝魔王神居靈幽宫治在西方庚之南禁上天帝君諱隗主領南魔王居化靈宫治在西方庚之北常融天帝君諱極主校學者之功居萬福宫治在西方辛之南騰勝天帝君諱浮𥠖主召集仙聖居白蓋宫治在西方辛之北梵度天帝君諱惡奕主進仙成聖居雲保宫治在西方戌之南賈奕天帝君諱精上主度學者之身居天寳宫治在西方戌之北諸天開圖卦爻甲子亶婁阿薈豫卦丁丑太皇黄曽天无惒觀音隨卦戊寅須延明首蠱卦已卯太明玉完天法攬菩曇臨卦庚辰稼那阿奕觀卦辛巳清明何童天忽訶流吟噬嗑壬午華都曲麗賁卦癸未玄胎平育天鮮菩育臻剥卦甲申答洛大梵復卦乙酉元明文舉天散煙慶雲无妄丙戌飛洒玉都大畜丁亥上明七曜天明魔上門頥卦戊子无行上首大過已丑虚无越衡天廻蹠流玄坎卦阿陁龍羅離卦太極濛翳天四象吁員咸卦庚寅南閻洞浮𢘆卦辛卯赤明和陽天玉眸詵詵遯卦壬辰梵形落空大壯癸巳玄明恭華天九靈推前𣈆卦甲午凙𠗂菩臺明夷乙未曜明宗飄天緑羅大千家人丙申眇莾九醜睽卦丁酉笁落皇笳天韶遥縁邅蹇卦戊戌雲上九都解卦己亥虚明堂曜天飛生自騫損卦庚子那育郁馥益卦辛丑觀明端靖天摩羅法輪夬卦壬寅霐持无鏡姤卦癸卯玄明恭慶天攬姿運容萃卦甲辰馥朗廓奕升卦乙己太煥極瑶天神纓自宫困卦丙午刀利禪猷井卦丁未元載孔昇天婆泥咎通革卦戊申宛藪滌色鼎卦己酉太安皇崖天太眇之堂震卦庚戌流羅梵萌艮卦辛亥顯定極風天景蔚蕭嵎漸卦壬子易邈无寂歸妹癸丑始皇孝芒天宛首少都豐卦甲寅阿繿郁笁旅卦乙卯太皇翁重天華莫延冉巽卦丙辰九開自便兊卦丁己无思江由天阿那品首渙卦戊午无量扶蓋節卦己未上揲阮樂天浮羅合神中孚庚申玉誕長桑小過辛酉无極曇誓天栢空度仙旣濟壬戌玃无自育未濟癸亥皓庭霄度天九日導乾乾卦坤母東覆坤卦淵通元洞天形攝上玄屯卦甲子陁羅育邈蒙卦乙丑翰寵妙成天眇炁合雲需卦丙寅飛天大醜訟卦丁卯秀樂禁上天緫監上天師卦戊辰沙陁劫量比卦己巳无上常融天龍漢瑛鮮小畜庚午碧落浮𥠖履卦辛未玉隆騰勝天空歌保珍㤗卦壬申惡奕无品否卦癸酉龍變梵度天洞妙自眞同人甲戌元梵恢漠大有乙亥平育賈奕天幽寂度人謙卦丙子諸天炁數卦息數下應人身九億萬炁豫三十九太皇黄曽天下屬聚眞府在脾隨四十五八億萬炁蠱四十五太明玉完天下屬炁㑹府在咽喉臨四十二七億萬炁觀四十二清明何童天下屬青靈府在肝噬嗑四十五六億萬炁賁四十五玄胎平育天下屬天督府在胞囊剥三十九五億萬炁復三十九元明文舉天下屬氷陽府在勢中无妄四十八四億萬炁大畜四十八七曜摩夷天下屬隂陽府在慾孔頥四十二三億萬炁大過四十八虚无越衡天下屬合眞府在腎中坎四十二二億萬炁離四十八太極濛翳天下屬順陽府在下丹田咸四十五九千萬炁𢘆四十五赤明和陽天下屬太元府在心中遯四十八八千萬炁大壯四十八玄明恭慶天下屬通靈府在膽𣈆四十二七千萬炁明夷四十二曜明宗飄天下屬天寧府在小腸家人四十八六千萬炁睽四十八笁落皇笳天下屬天河府在大陽蹇四十二五千萬炁解四十二虚明堂耀天下屬華蓋府在肺損四十五四千萬炁益四十五觀明端靖天下屬太和府在十二重樓夬五十一三千萬炁姤五十一玄明恭慶天下屬玄林府在髮根萃四十二二千萬炁升四十二太煥極瑶天下屬玄隂府在項困四十五九百萬炁井四十五元載孔昇天下屬玄陸府在兩目後革四十八八百萬炁鼎四十八太安皇崖天下屬玄苑府在兩眼目頭震四十二七百萬炁艮四十二顯定極風天下屬玄澧府在舌下漸四十五六百萬炁歸妹四十五始皇孝芒天下屬玄澤府在心中豐四十五五百萬炁旅四十五翁重浮容天下屬巽四十五四百萬炁兌四十五无思江由天下屬玄庭府在臍中渙四十五三百萬炁節四十五上楪阮樂天下屬玄通府在口中中孚四十八二百萬炁小過四十二无極曇誓天下屬玄伺府在右耳旣濟四十五九萬九千炁未濟四十五皓庭霄度天下屬玄虚府在左耳乾五十四八萬八千炁坤三十六淵通元洞天下屬玄元府在右目屯四十二七萬七千炁蒙四十二翰寵妙成天下屬玄明府在左目需四十八六萬六千炁訟四十八秀樂禁上天下屬玄微府在右鼻孔師三十九五萬五千炁比三十九无上常融天下屬玄妙府在左鼻孔小畜五十一四萬四千炁履五十一玉隆騰勝天下屬玄陽府在鼻中泰四十五三萬三千炁否四十五龍變梵度天下屬玄極府在玉枕同人五十一二萬二千炁大有五十一平育賈奕天下屬玄都府在頂頭謙三十九修用假令法式玄旨曰歩三十二天元綱西龜轉輪无色局歩至九萬里到赤明和陽天令踏局令天想炁入口吞丹例謂如内解道德經内甲子屬某府又看靈寳大法隱語所開圖文屬何甲子隱語屬是何天又屬何卦元綱屬何宿歩入元綱局中吸木屬天炁入兆身某甲子府依卦爻定息以炁結隱文府内成天文或治事看天府所主清炁用以甲子日甲子時爲始用迍卦午時用䝉卦子時服亶婁阿薈四字午時服无惒觀音四字子時服迍卦午時服蒙卦其請天炁法於每日天欲明之時已前晨光初發之始隨諸天面方請梵炁灌注身中所屬宫府訣曰甲子之時稽首望天存其炁色綿綿連連叩齒六六仰望上天存其炁象宛宛延延如絲如霧流注宫田以口回轉如丹如煙以意送歸宫府之邊一呼一吸百脉流徧服之千日神飛上天右於每月三日五日七日九日十五日一月五過受元始之祖炁流布身中功成宻有升騰之㑹如上諸法上可動之於心不得以輕示人盗泄則靈散仙无由成修行之法春正二三月朱書文向王叩齒九通而呪曰飛天大梵維羅八方九炁青天緫爲神王五合八㑹流煥太空上關龍漢神仙之宗下拔長夜九幽之房拔度苦魂朽骸生光身變毛羽五色衣裳蒼龍碧輦飛歩空行今日上告青天始陽莫願諧合與炁齊同升入无形永保无窮畢服文仰咽八炁止夏四五六月朱書文向王叩齒八通而呪曰天書敷羅梵行赤明上開八道五合通靈大運啓期洞陽錬精玉文煥朗三景自明下度生死一切受形今日良吉大聖臨庭九夜開牖幽房朗清三惡休息我道自成五帝保度上登蕭京七寳林内長享劫齡畢服文仰咽八炁止秋七八九月朱書文向王叩齒七通而呪曰飛玄八㑹結炁成眞六十四字緫靈天根開度生死朽骨還人幽魂披散受炁上玄今日時慶萬願開陳衆眞交㑹我願成仙景與道合我願我神得乗素雲上昇帝晨七寳懽樂交友眞人畢服文仰咽八炁止冬十十一十二月朱書文向王叩齒五通而呪曰玉字開㝠流煥上門八炁結眞梵行景雲神王啓光三象洞分五色徘徊昭我靈魂今日值合仰希帝君大有出書受我眞文玉澤交灌五府生雲毛羽變化駕景乗晨出有入旡仙度自然七祖同歸歡樂上元畢服文仰咽八炁止下映人身主諸吉凶上壇頭爲上清宫頭頂骨是也動主遇貴善賢人急動君恩赦到痛主父母師友災泥丸宫爲太清宫胷骨是也動遇出世神仙文藝頂前急動有雨至腦後動主晴痛主自身災痒主風雲藏宫印堂是也動主印信喜事動慢主逢信善人額上至印堂主印信來痒主小喜至及微風痛主失官壞印天涯宫髮際是也動主隂雨痒主隂雲散春夏痒動急有風雨雷電痛主外服及外親有凶事左右雲涯宫額角是也動主見君子賢善人冷如水滴主有隂雨神門急動恍惚痛名死門開主壽終左右日月宫太隂太陽宂是也左動主東南風右動主西南風腦後左東北風腦後右西北風額前動主見善人痛主父母大災左右雲門宫兩眉是也動主得藝術文書冷痒左主乾坎艮震有隂雲右主巽離坤兌隂雲兩眉頭相牽連動主有相連事眉下眼上動主酒食賔客動痛主大風痛急主因酒食相爭陽聚宫左目是隂聚宫右目是跳動淚出主猛雨至眼上動有人羙喜事動急主親眷至眼下臉動主見他哭泣痛如針剌淚出主自已有悲泣事以左陽右隂占之左右勾陳宫兩目上下臉是也左上臉動主陽人說美羡事右上臉動主隂人說美羡事左下臉主陽人破美羡事右下臉主隂人破羙羡事如左右下臉痛主兒女子孫有災魔王宫鼻梁是也動主見衆死事又主鬼行隂暗事若鼻撋痒人送物來如鼻酸痛主有人謀計冝愼之左龍遊宫左鼻孔是也動主猛雨痛主水災右虎遊宫右鼻孔是也動主猛風痛主風災日顴宫左顴頰骨是也月顴宫右顴頰骨是也左動主陽人毀謗右動主隂人毀謗兩頰赤痒動有人來面問口舌事如兩頰熱及面熱身心恍惚主毀罵是非喧閙冝愼之左陽宫左耳竅是也七殺宫右耳竅是也左動聞美喜事耳輪動急或痛主州邑有反逆賊至如右動主聞驚惡事痛主不測災冝回靜地避之耳後動如熱氣迫主火發耳前動主水災上瓊林宫人中髭是也下瓊林宫鬚承漿是也動主滋益延納喜美事承漿動主酒食需索事痛主行動艱難辛苦事兩顋動主交友死亡左文右武左男右女五陽門上唇是五隂門下唇是也上動主陽人君子褒美事下動主隂人小人謗說事如唇痒動主美食如稍痛痒主飲食殘缺如唇畔動主飲食唇吻動主憂口舌牙頰動亦主口舌萬物帶舌是也動主食中有毒痒主酒食痛主卒病痛急主口舌如痛痒不止有蠱螞等毒物俛合宫頦頥是也動主近次人毀罵事動痒主借貸財物事痛主大病喪財物事息脢環喉嚨是也動主遇髙人談清髙事咽上喉下痛動主大不祥事兩邊動主見哭泣金鎻宫項窩是也動主天地祥異雷霆大震𣈆動憂枷鎻急動痛主血光項上痛主憂官災兩邊動主飲食中壇白虎宫胷前是也動主𠒋惡人凶惡事相㝷痒主上智君子人至痛主凶禍事朱雀門正尻尾下是也動主惡人相謀正心撋痒有人相憶心兩畔動主有人慾心相望心痛徹内主自己死亡左承重宫左肩是也右承重宫右肩是也左動主齊肩朋友至右動主僧尼至左又是道人痛主負重向逺左兵門左胛子骨是也右兵門右胛子骨是也動主見人爭說語言血盆骨動主血光立至背上近胛骨動主兵甲負重事後背心動主下人背己惡逆相害脊骨動主登髙脊膂下動主見貧下相求夾脊兩邊俱動主有人背己闘謀所求不成左掖道左腋脇是也右掖道右腋脅是也動主見人說相潤事左男右女脇動有人拹己短長右動无害腋下動主閑人至兩脇動主見文武官員議事左蟾宫左膞蝦䗫兒是也右蟾宫右膞蝦䗫兒是也左動主青龍喜慶事動痒主有膊至右動主白虎凶憂事動痒主有風左外有勝友至右外主小人來左力士宫左臂肘是也右力士宫右臂肘是也膊外動左主九流人至曲肘裏動主有隂人曲倖隱蔽不相見肘後動有女伎藝來臂内動有技術人來臂上動空門人來臂下動主虚妄人來左聚脉宫左手腕是也右聚脉宫右手腕是也動痛主隂人刑禁事右主打磕損傷事腕痒左主持財入右主持財出右腕痛動主破失財物左衆應宫左手是也右衆應宫右手是也左手掌痒主大得財右手掌痒主財散左大指動主禮樂右大指動主婚禮虎口痛動主毒蟲傷山居被虎狼傷左手背動主爭競痛主歐打左手背痒有微財右手主虚詐左手動痒主髙人指訣事無名小指動有美酒食左手大指痛憂父右拇二指痛憂兄中指痛憂己身四指小指憂子弟左憂母姊妻妹女扶桑宫左乳是也龜臺宫右乳是也兩乳動有人相念左主子孫喜痒主得喜奴婢痛主恩義人身亡下壇福聚宮腹是也慾門臍下是也太淵宮臍心是也車軸關腰是也腹動有福禄人至肚動有暗人嫉妬事臍下動有染着事臍四向中動主弟兄至腰間動有邀譽人至連生處動近上憂六畜臍下撁龜動主婦女交往冝廻避之承重宫臀是也臀内動主與髙上人同坐痒痛急動不止見人受刑責臀上動主有爭闘左臀痛主人爭競毁罵右主隂人謗毀左大力宫左腿是也右大力宫右腿是也大腿股内動主清髙人至近上動主外人至近下動主卑小至又主僧尼至大腿動主見人集㑹事右主隂集㑹左蓋宫左膝是也右蓋官右膝是也左動主拜人右動主受人拜痒主禮拜髙人痛主卑下人拜左轉以宮左腿肚膁肕是也右轉以宮右腿肚膁是也腿肚子動主教藝業人至左乃道士道人至右乃隂人小人至膁外動主縛繫事膁眼䠋骨動主小人誑惑虚妄事曲䐐動主卑小謀害右是隂人膁肕骨痛動主有血傷事左車宫左脚踝是也右車宫右脚踝是也動主逢六畜驚右主猛獸驚脚根筋動主逢惡人脚面動主乆别親至右主隂人也左繫鞋宫左脚面是也右繫鞋宫右脚面是也繫鞋文動主刼賊脚面動有驚恐差異事左龍轉宫左脚是也右龍轉宫右脚是也左脚小指遶掌動主見盜賊右主闘爭掌心痛主死哀脚掌四面動主八方人來以中指爲正南也痛主惡人來右脚主防奴婢小人脫賺痛主旱脚根痛動主被人根㝷脚腕動主打傷事脚心痒動在主逺行右三壇上應諸天應是三界内外自身骨肉交朋動靜吉凶天氣一降隨氣應之分其三候痒則主喜瞤則主動痛則主凶候其輕重緊慢以五日候之如瞤動沉重疼緊則敦刻應之先重後輕多虚傳謾語其帝命天恩風雨水火及命中一動一瞤主一日三跳已上主十日仍須於受氣之時望諸天於星月下燒香再拜宻奏曰具位臣某至心仰告三清玉皇上帝諸天天帝臣受之炁下應臣身敢不精心滌慮思真感神念臣以凡俗昏迷困在塵世罔知世間一切吉凶不能洞曉未來禍福仰告天尊上帝憫臣凡愚𠃔納奏請假借威光正真道炁降流臣身令能聦明智慧上應諸天至誠感神照知臣身世間動靜吉凶預報臣知委臣无任祈恩望聖激切屏營之至臣言再四拜畢再取天炁三口吹於身中凡動靜疼痒依法占之无不預曉不得亂思疑惑愼之愼之受元始萬炁之祖凡修其道常以正月二月三月四月五月六月七月八月九月十月十一月十二月月三日月五日月七日月九日十五日一月五遇清齋誦詠玄文一徧以夜半之後露出中庭仰思北斗華蓋之中有紫雲之炁以斗中罡左廻曆度二十八宿竟還金門之上若在人中天隂无光當於室内黙念内思如法每令分明思畢當以拜紫雲四通叩齒三通仰祝曰天夜朗清幽虚啓眞流雲徘徊金華四騫丹皇敷暉霞飛紫軿是夕開陳青金授化成我上願體應自然結命丹華保命日根三靈合景永停龍山宻夜清披請如所言呪畢便口引紫炁二十八咽止行此三年剋有神降兆席也身有紫炁映終一形九天書名必獲上仙也天有紫炁之雲干於日月五星之分在其方圓皆有合道之人得仙之君也如此之候其象自見得見紫雲便依文禮祝不必須其常日也勤如在意刻得雲降昇騰有㑹也止可勤之於已不得輕以示人道泄則靈散仙炁无成也洞章玄文飛玄紫炁凝靈根綱維玉靈緫萬神其中鬱勃結自然上有稜層十二傳玉樓峩峩耀景雲華精紫闕帶金軒瓊臺玡鑠繞八騫中有青金九靈仙丹皇真母號精延飛青羽欘晨嬰冠左執玉節握靈旛五色命魔對帝尊把持符籍當生門咀日嚼月吸玉泉離羅吐暉錬五魂内充外溢絳府妍金光煥煥形正圓圓以朔朔金色沌唯有開明曉此言日五月十精北元刻見華蓋領仙君紫炁左廻與斗連歷度四七入金門正是丹皇降萬仙有明此訣加精勤被形宻思每令分妙景感㑹得要文三年當審保長存九年乗空致羽裙鳯衣輕翔昇龍山俯仰九靈謁玉宸靈寳淨明大法萬道玉章秘訣終
