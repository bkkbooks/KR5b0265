front:
  text: 靈寳淨明大法萬道玉章秘訣身七夫神玄未肇化空獨輪渺靄三炁之先混淪二儀之始无炁挺運无色无形晻曜凝虚乍亡乍存中有象帝元始至尊啓劫開圖明廓秀梵文華昭粹流雲結芳於太初回霞鬱煙玄紀呇景於碧落字方一丈八角垂芒召洞陽之融精爲郁瑛之流火飛丹炅浩冶錬變章名曰赤書呈祥孕字皇人按筆昔書其文散布諸天安鎮萬國三境由兹以朗耀五緯因此以生成普植神靈萬範開麗至始青之大㑹傳上品於玉晨昭明黍珠廣示道體神變十回恢洪妙用而有敢宣傳三千道境无量度人演說五億諸天品秩莫測三十六部秘在玄宫萬八千篇流芳塵地上該帝一混合之道則大定歷劫以無傾中明五法育初之法則造化萬彚以長存下說人身三宫之妙則體道含眞而功用在已其緒餘也以濟生度死開宥九幽超渉玄津僕昔在太陽玄宫掌紫閣圖籍甞侍无上三眞說璇綱清炁採取玄範之圖注練百開生成玉字之經一身三聖萬道同體之書神動天隨念動化移之法洞觀三界徹視萬靈之妙先被宸命承左仙公之代以功德未備尚猶困辱塵世粗訖萬分彷彿之一以傳吾門同志受者毋忽焉太陽玄宫昌明閣掌圖籍小兆謹序謹按天眞皇人八明訓解一者明元始祖炁何先化成玉字二者明元始祖炁无形之先作何比擬降質成炁化生萬寳今世作何體狀採錬此炁餌之登眞玄訓曰自三炁之先溟涬之後其中眞精歘火挺生元炁元炁之内有神人曰元始天尊其炁混凝與神同生流化結芳非相非色或卷或舒不可致詰不可名象至延康開劫一炁分形而爲二炁名曰虚无二炁交絡凝相太空乍存乍亡彌覆无際二炁混包掩靄光華中有文章八角垂芒莫辨文理至一劫之後龍漢元年開劫顯明分𨽻二炁以成玄黄之色是時啓判鴻濛分析混沌清炁澄髙積陽成天濁炁降凝積滯成地二炁分形玉字兆相字方一丈八角成文名曰雲篆光明之章二炁升降或離或合中化冲和之炁又曰始青之炁又曰大梵之炁化眞陽之精而洞陽之火流冶十方天尊運洞陽神火冶錬天文於太空之際三炁混合飛霞結質光瑩萬天照徹无極混㑹自象而成赤書因而劫號赤明之劫文號赤書玉字因字化生三景照煥三光矣玉字以此而化生也所謂今世作何體狀復採錬此炁爲寳餌之登眞者玄訓曰謂神降爲靈炁聚爲寳蚌吸月華而孕珠犀觀星輝而秀象形彩照珉以生丹皓虹映石産璧蓋靈寳之炁禽飲生鳯獸嘯産麟人服成仙魚飲化龍又曰聖母靈父元炁炁來入身謂之道生生道合一謂之得道經云引炁三十二徧又曰流精玉光又曰炁入玄玄蓋言此也謹按元始赤書五篇眞文生於太空之中天地未光開圖赤明濳結元根三景成立五炁行焉五色分彩洞煥五方置以五常導以隂陽輪轉九天之紐運明五星之光植五岳而安鎮澳人五府以養神是以至眞之人甞依陽光之始明上導元始之炁下引玉泉之流芳致元精於太極招五炁於靈宫所爲靈寳妙訣萬聖之根宗也謹按圖如左太皇黄曽天梵炁黄炁中斗綱清炁太明玉完天緑炁壁宿綱清炁清明何童天青炁室宿綱清炁玄胎平育天赤炁危宿綱清炁元明文舉天蒼炁虚宿綱清炁上明七曜天黒炁女宿綱清炁虚无越衡天碧炁牛宿綱清炁太極濛翳天紫炁斗宿綱清炁赤明和陽天梵炁白炁中斗綱清炁玄明恭華天黄炁箕宿綱清炁曜明宗飄天緑炁尾宿綱清炁𥫦落皇笳天青炁心宿綱清炁虛明堂曜天赤炁房宿綱清炁觀明端靖天蒼炁氐宿綱清炁玄明恭慶天黒炁亢宿綱清炁太煥極瑶天碧炁角宿綱清炁元載孔昇天紫炁梵炁中斗綱清炁太安皇崖天白炁軫宿綱清炁顯定極風天黄炁翼宿綱清炁始皇孝芒天緑炁張宿綱清炁太皇翁重天青炁星宿綱清炁无思江由天赤炁柳宿綱清炁上楪阮樂天蒼炁鬼宿綱清炁无極曇誓天黒炁井宿綱清炁皓庭霄度天碧炁梵炁中斗綱清炁淵通元洞天紫炁參宿綱清炁太文翰寵天白炁觜宿綱清炁太素秀樂天黄炁畢宿綱清炁太虚无上天緑炁昴宿綱清炁太釋玉隆天青炁胃宿綱清炁龍變梵度天赤炁婁宿綱清炁太極平育天蒼炁奎宿綱清炁太皇黄曽天帝君諱觀覺
